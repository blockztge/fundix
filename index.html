const css = `
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #04080A;
  font-family: 'DM Sans', sans-serif;
  color: ${C.text};
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 20px;
}

.phone {
  width: 375px;
  height: 812px;
  background: ${C.dark};
  border-radius: 50px;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  box-shadow:
    0 0 0 1px rgba(200,162,39,0.08),
    0 0 0 1.5px rgba(255,255,255,0.03),
    0 48px 120px rgba(0,0,0,0.9);
  flex-shrink: 0;
}
.phone::before {
  content: '';
  position: absolute; top: 0; left: 50%;
  transform: translateX(-50%);
  width: 108px; height: 28px;
  background: ${C.dark};
  border-radius: 0 0 16px 16px;
  z-index: 999;
}

.status {
  padding: 12px 26px 0;
  display: flex; justify-content: space-between;
  font-size: 10px; font-weight: 600;
  color: ${C.muted}; flex-shrink: 0;
  font-family: 'DM Mono', monospace;
}

.screen { flex: 1; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; }
.screen::-webkit-scrollbar { display: none; }

/* ONBOARDING */
.ob { flex: 1; display: flex; flex-direction: column; padding: 0 28px 32px; height: 100%; }
.ob-visual { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
.ob-symbol {
  width: 100px; height: 100px;
  border-radius: 50%;
  border: 1.5px solid;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 28px; font-weight: 500;
}
.ob-line { width: 1px; height: 40px; background: linear-gradient(to bottom, currentColor, transparent); opacity: 0.3; }
.ob-step { font-family: 'DM Mono', monospace; font-size: 10px; color: ${C.brand}; letter-spacing: 2px; margin-bottom: 10px; }
.ob-title { font-size: 24px; font-weight: 700; color: ${C.white}; line-height: 1.25; margin-bottom: 12px; }
.ob-body { font-size: 14px; color: ${C.muted}; line-height: 1.65; margin-bottom: 28px; }
.ob-dots { display: flex; gap: 6px; margin-bottom: 20px; }
.ob-dot { height: 2px; border-radius: 1px; background: ${C.border}; transition: all 0.3s; }
.ob-dot.on { background: ${C.brand}; width: 24px; }
.ob-dot:not(.on) { width: 6px; }
.ob-btn {
  width: 100%; padding: 16px;
  background: ${C.brand}; color: ${C.dark};
  border: none; border-radius: 14px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 700; font-size: 15px;
  cursor: pointer; transition: all 0.2s;
  letter-spacing: 0.3px;

// ── ONBOARDING ────────────────────────────────────────────────
function Onboarding({ onDone }) {
  const [step, setStep] = useState("role");
  const [rol,  setRol]  = useState(null);
  const [idx,  setIdx]  = useState(0);

  const slides  = rol === "comprador" ? OB_SLIDES_COMPRADOR : OB_SLIDES_VENDEDOR;
  const s       = slides[idx];
  const isLast  = idx === slides.length - 1;

  if (step === "role") return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",padding:"0 28px 36px",background:C.dark}}>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}>
        <div style={{fontFamily:"DM Mono,monospace",fontSize:20,fontWeight:500,color:C.brand,letterSpacing:3,marginBottom:12}}>FUNDIX</div>
        <div style={{fontSize:26,fontWeight:800,color:C.white,textAlign:"center",lineHeight:1.25,marginBottom:8}}>
          ¿Cómo vas<br/>a usar la app?
        </div>
        <div style={{fontSize:13,color:C.muted,textAlign:"center",lineHeight:1.65}}>
          Personalizamos tu experiencia<br/>según tu perfil.
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {[
          {id:"vendedor",  emoji:"📦", title:"Quiero vender material",    sub:"Tengo chatarra, cables o metales para vender"},
          {id:"comprador", emoji:"🏭", title:"Soy comprador / acopiador", sub:"Compro material y quiero más clientes · Gratis ahora"},
        ].map(r => (
          <button key={r.id} onClick={()=>{setRol(r.id);setStep("slides");}} style={{
            background:C.card, border:`1px solid ${C.border}`, borderRadius:16,
            padding:"16px 18px", display:"flex", alignItems:"center", gap:14,
            cursor:"pointer", textAlign:"left", width:"100%", fontFamily:"DM Sans,sans-serif",
          }}>
            <span style={{fontSize:28,flexShrink:0}}>{r.emoji}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:3}}>{r.title}</div>
              <div style={{fontSize:11,color:C.muted}}>{r.sub}</div>
            </div>
            <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
        ))}
        {/* Aviso período fundador */}
        <div style={{background:"rgba(200,162,39,0.05)",border:"1px solid rgba(200,162,39,0.15)",borderRadius:12,padding:12,marginTop:4}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
            <span style={{fontSize:16,flexShrink:0}}>⏳</span>
            <div style={{fontSize:11,color:C.muted,lineHeight:1.65}}>
              <strong style={{color:C.brand}}>Período de lanzamiento:</strong> los compradores que se registren ahora acceden gratis. Cuando activemos el plan Pro, conservan precio fundador de por vida.
            </div>
          </div>
        </div>
        <button style={{background:"none",border:"none",color:C.muted,fontSize:12,cursor:"pointer",padding:"10px 0",fontFamily:"DM Sans,sans-serif"}}
          onClick={()=>onDone("vendedor")}>Omitir por ahora</button>
      </div>
    </div>
  );

  return (
    <div className="ob fade" style={{height:"100%",display:"flex",flexDirection:"column"}}>
      <div className="ob-visual">
        {s.isEmoji
          ? <div style={{fontSize:64}}>📍</div>
          : <div className="ob-symbol" style={{color:s.color,borderColor:s.color}}>{s.symbol}</div>}
        <div className="ob-line" style={{color:s.isEmoji?C.brand:s.color}}/>
      </div>
      <div>
        <div style={{fontFamily:"DM Mono,monospace",fontSize:9,color:rol==="comprador"?C.blue:C.brand,letterSpacing:2,marginBottom:6}}>
          {rol==="comprador"?"PARA COMPRADORES":"PARA VENDEDORES"}
        </div>
        <div className="ob-step">{s.step}</div>
        <div className="ob-title">{s.title}</div>
        <div className="ob-body">{s.body}</div>
        <div className="ob-dots">
          {slides.map((_,j)=><div key={j} className={`ob-dot ${j===idx?"on":""}`}/>)}
        </div>
        <button className="ob-btn" onClick={()=>isLast?onDone(rol):setIdx(idx+1)}>
          {isLast?"Empezar":"Siguiente"}
        </button>
        {!isLast && <button className="ob-skip" onClick={()=>onDone(rol)}>Omitir</button>}
      </div>
    </div>
  );
}

function IAScreen({ onBack }) {
  const [st, setSt] = useState("idle");
  const [conf, setConf] = useState(0);

  const scan = () => {
    setSt("scanning");
    setTimeout(() => {
      setSt("result");
      let c = 0;
      const iv = setInterval(() => { c += 2; setConf(c); if (c >= 87) clearInterval(iv); }, 18);
    }, 1800);
  };

  return (
    <div className="fade">
      <div className="back" onClick={onBack}>
        <Icon.ArrowLeft /><span className="back-label">Volver</span>
      </div>
      <div className="ia-screen">
        <div className="wiz-q">Identificar metal</div>
        <div className="wiz-hint">Fotografiá el material y la IA analiza el tipo y precio.</div>

        {st === "idle" && (
          <>
            <div className="upload-area" onClick={scan}>
              <Icon.Scan size={44} color={C.brand} />
              <div className="upload-title">📸 Fotografiar material</div>
              <div className="upload-sub">o seleccionar de la galería</div>
            </div>
            <div className="metal-id-list">

              {METALS.map(m => (
                <div key={m.id} className="mil-row">
                  <div className="mil-sym" style={{ color: m.color, borderColor: m.color + "50" }}>{m.symbol}</div>
                  <div>
                    <div className="mil-name">{m.name}</div>
                    <div className="mil-hint">{m.hint}</div>
                  </div>
                </div>
              ))}
            </div>
          </>
        )}

        {st === "scanning" && (
          <div className="scanning-wrap">
            <Icon.Scan size={52} color={C.brand} />
            <div className="scanning-line" />
            <div className="scanning-text">ANALIZANDO MUESTRA...</div>
          </div>
        )}

        {st === "result" && (
          <div className="fade">
            <div className="ia-result">
              <div className="ia-result-top">
                <div className="ia-sym" style={{ color: "#B87333", border: "1.5px solid #B87333", width: 52, height: 52, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center" }}>Cu</div>
                <div>
                  <div className="ia-metal-name">Cobre</div>
                  <div className="ia-conf-label">{conf}% de certeza</div>
                </div>
              </div>
              <div className="conf-bar-bg">
                <div className="conf-bar-fill" style={{ width: `${conf}%` }} />
              </div>
              <div className="ia-price-box">
                <div className="ia-price-label">PRECIO DE REFERENCIA · HOY</div>
                <div className="ia-price-val">$8.750/kg</div>
              </div>
              <div className="ia-tip">
                <strong>Cómo confirmar: </strong>
                El cobre es rojizo-naranja y muy maleable. Al frotarlo deja una marca dorada característica.
              </div>
            </div>
            <button className="btn-primary" style={{ marginBottom: 8 }} onClick={() => { setSt("idle"); setConf(0); }}>
              📸 Analizar otro material
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function Fundix() {
  const [view,     setView]     = useState("onboarding");
  const [selMetal, setSelMetal] = useState(null);
  const [selKg,    setSelKg]    = useState(null);
  const [user,     setUser]     = useState(null);
  const [rol,      setRol]      = useState("vendedor");
  const [compradores, setCompradores] = useState(COMPRADORES);
  const [vendedores,  setVendedores]  = useState(VENDEDORES);
  const [selComprador, setSelComprador] = useState(null);
  const [selChat,      setSelChat]      = useState(null);

  const goHome  = () => { setView("home"); setSelMetal(null); setSelKg(null); };
  const isWizard = ["pick-metal","enter-kg","result"].includes(view);
  const noNav    = ["onboarding","login","register"].includes(view);

  // Nav adapts to rol
  const NAV = [
    { id:"home",    label:"INICIO",   icon:(on)=><Icon.Home      size={20} color={on?C.brand:C.muted}/> },
    { id:"cuanto",  label:"PRECIO",   icon:(on)=><Icon.DollarSign size={20} color={on?C.brand:C.muted}/> },
    { id:"donde",   label: rol==="comprador" ? "VENDEDORES" : "COMPRADORES", icon:(on)=><Icon.MapPin size={20} color={on?C.brand:C.muted}/> },
    { id:"chat",    label:"MENSAJES", icon:(on)=>(
        <svg width={20} height={20} viewBox="0 0 24 24" fill="none" stroke={on?C.brand:C.muted} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
    )},
    { id:"alertas", label:"ALERTAS",  icon:(on)=>(
        <svg width={20} height={20} viewBox="0 0 24 24" fill="none" stroke={on?C.brand:C.muted} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
    )},
    { id:"profile", label:user?"PERFIL":"ENTRAR", icon:(on)=>(
        <svg width={20} height={20} viewBox="0 0 24 24" fill="none" stroke={on?C.brand:C.muted} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
    )},
  ];

  const gated = (dest) => user ? dest : "login";

  const renderView = () => {
    switch (view) {
      case "onboarding": return <Onboarding onDone={(r)=>{ setRol(r); setView("home"); }}/>;
      case "login":      return <LoginScreen
                            onBack={()=>setView("home")}
                            onLogin={()=>{ setUser({name:"Usuario",verified:false}); setView("home"); }}
                            onRegister={()=>setView("register")}/>;
      case "register":   return <RegisterScreen
                            onBack={()=>setView("login")}
                            onDone={()=>{ setUser({name:"Usuario",verified:true}); setView("home"); }}/>;

      case "home":       return <Home
                            rol={rol} user={user}
                            onCuanto={()=>setView(gated("pick-metal"))}
                            onDonde={()=>setView("donde")}
                            onIA={()=>setView(gated("ia"))}
                            onHistorial={()=>setView(gated("historial"))}
                            onRetiro={()=>setView(gated("retiro"))}
                            onB2B={()=>setView(gated("b2b"))}
                            onPlanes={()=>setView("planes")} onSumate={()=>setView("sumate")}
                            onLogin={()=>setView("login")}/>;

      case "pick-metal": return <PickMetal onBack={goHome} onNext={m=>{setSelMetal(m);setView("enter-kg");}}/>;
      case "enter-kg":   return <EnterKg metal={selMetal} onBack={()=>setView("pick-metal")} onResult={kg=>{setSelKg(kg);setView("result");}}/>;
      case "result":     return <Result metal={selMetal} kg={selKg} onDonde={()=>setView("donde")} onBack={()=>setView("enter-kg")}/>;
      case "donde":      return <DondeVender metal={selMetal} onBack={()=>setView(selMetal?"result":"home")} compradores={compradores} vendedores={vendedores} rol={rol} onVerPerfil={(c)=>{ setSelComprador(c); setView("perfil-comprador"); }} onVerPerfilVendedor={(v)=>{ setView("perfil-vendedor"); }}/>;
      case "ia":         return <IAScreen onBack={goHome}/>;

      case "historial":  return <HistorialScreen onBack={goHome}/>;
      case "chat":       return <ChatListScreen rol={rol} onBack={goHome} onChat={(c)=>{ setSelChat(c); setView("chat-conv"); }}/>;
      case "chat-conv":  return <ChatConversacionScreen chat={selChat} onBack={()=>setView("chat")}/>;
      case "alertas":    return <AlertasScreen onBack={goHome}/>;
      case "retiro":     return <RetiroScreen onBack={goHome}/>;
      case "b2b":        return <B2BScreen onBack={goHome}/>;
      case "resena":        return <ReseñaScreen comprador={null} onBack={()=>setView("perfil-comprador")} onDone={goHome}/>;
      case "perfil-comprador": return <PerfilCompradorScreen comprador={selComprador} onBack={()=>setView("donde")} onResena={()=>setView("resena")} onChat={()=>{ setSelChat(selComprador ? {...selComprador, tipo:"comprador", online:true} : CHATS_MOCK[0]); setView("chat-conv"); }}/>;
      case "perfil-vendedor":  return <PerfilVendedorScreen vendedor={null} onBack={()=>setView("historial")}/>;
      case "insignias":  return <InsigniasScreen onBack={()=>setView(user?"profile":"home")} rol={rol}/>;
      case "panel":      return <PanelCompradorScreen onBack={()=>setView(user?"profile":"home")} onInsignias={()=>setView("insignias")}/>;
      case "planes":     return <PlanesCompradorScreen onBack={()=>setView(user?"profile":"home")}/>;
      case "sumate":     return <SumateScreen onBack={()=>setView("home")} onDone={(datos)=>{ setUser({name: datos.nombre || "Comprador",verified:true}); setCompradores(prev=>[...prev,{id:prev.length+1,name:datos.nombre||"Tu negocio",dist:"0 m",rating:0,reviews:0,open:true,phone:datos.whatsapp||"",domicilio:datos.retiro||false,nivel:"normal",address:datos.direccion||""}]); setView("profile"); }}/>;
      case "profile":    return <ProfileScreen user={user} rol={rol} onBack={goHome} onPlanes={()=>setView("planes")} onPanel={()=>setView("panel")} onInsignias={()=>setView("insignias")} onSumate={()=>setView("sumate")} onLogout={()=>{ setUser(null); goHome(); }}/>;

      default: return null;
    }
  };

  return (
    <>
      <style>{css}</style>
      <div className="phone">
        <div className="status"><span>09:41</span><span/><span>●●● 5G</span></div>

        {!noNav && (
          <div className="hdr">
            <div className="logo">FUNDIX</div>
            <div className="hdr-right">
              <Icon.Bell size={18} color={C.muted}/>
              {user ? (
                <div className="avatar" onClick={()=>setView("profile")} style={{cursor:"pointer"}}>
                  <span style={{fontSize:11,fontWeight:700,color:C.brand}}>{(user.name||"U")[0]}</span>
                </div>
              ) : (
                <button onClick={()=>setView("login")} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:20,padding:"5px 12px",color:C.text,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>
                  Ingresar
                </button>
              )}
            </div>
          </div>
        )}

        <div className="screen">{renderView()}</div>

        {!noNav && (
          <div className="bottom-nav">
            {NAV.map(n => {
              const on = view===n.id || (n.id==="cuanto" && isWizard);
              return (
                <div key={n.id} className={`nav-item ${on?"on":""}`}
                  onClick={()=>{
                    if      (n.id==="home")    goHome();
                    else if (n.id==="cuanto")  { setSelMetal(null); setSelKg(null); setView(gated("pick-metal")); }
                    else if (n.id==="alertas") setView(gated("alertas"));
                    else if (n.id==="profile") setView(user?"profile":"login");
                    else setView(n.id);
                  }}>
                  {n.icon(on)}
                  <span className="nav-label">{n.label}</span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </>
  );
}


    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Fundix));
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(()=>{});
    }
  </script>
</body>
</html>
